[env:T5-ePaper-S3]
platform  = espressif32@6.12.0
framework = arduino

; esp32-s3-devkitc1-n16r8 = 16 MB Flash Quad, 8 MB OPI-PSRAM
; Preset setzt BOARD_HAS_PSRAM, memory_type=qio_opi und partitions=default_16MB.csv
board = esp32-s3-devkitc1-n16r8

board_build.filesystem = littlefs

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DLILYGO_T5_EPD47_S3

lib_deps =
    lewisxhe/SensorLib @ 0.3.1
    lennarthennigs/Button2 @ 2.3.2
    bblanchon/ArduinoJson@^7.4.2
    knolleary/PubSubClient @ ^2.8
    https://github.com/Xinyuan-LilyGO/LilyGo-EPD47.git#esp32s3

monitor_speed = 115200
; 921600 kann bei manchen USB-Kabeln zu „Failed to connect“ führen
upload_speed  = 460800
; Manuell: BOOT halten → RST tippen → BOOT los, dann Upload starten.
; Ohne Boot-Modus verbindet es sich oft nicht (USB-JTAG / Enumeration).
upload_flags =
    --before=no_reset
    --after=hard_reset
